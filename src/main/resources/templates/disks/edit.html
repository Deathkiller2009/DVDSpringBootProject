<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit disk</title>
</head>
<body>

<h1>Редактировать диск</h1>

<form th:method="patch" th:action="@{/disks/{id}(id=${diskId})}" th:object="${disk}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

    <label for="title">Название</label>
    <input type="text" th:field="*{title}" id="title">

    <div style="color: red"
         th:if="${#fields.hasErrors('title')}"
         th:errors="*{title}">
    </div>

    <br>

    <label for="author">Автор</label>
    <input type="text" th:field="*{author}" id="author">

    <div style="color: red"
         th:if="${#fields.hasErrors('author')}"
         th:errors="*{author}">
    </div>

    <br>

    <label for="releaseDate">Дата релиза</label>
    <input type="date" th:field="*{releaseDate}" id="releaseDate">

    <div style="color: red"
         th:if="${#fields.hasErrors('releaseDate')}"
         th:errors="*{releaseDate}">
    </div>

    <br>

    <label for="annotation">Аннотация</label>
    <input type="text" th:field="*{annotation}" id="annotation">

    <div style="color: red"
         th:if="${#fields.hasErrors('annotation')}"
         th:errors="*{annotation}">
    </div>

    <br><br>

    <input type="submit" value="Сохранить изменения">
</form>

<br>

<a th:href="@{/disks/{id}(id=${diskId})}">Назад к диску</a>

</body>
</html>
