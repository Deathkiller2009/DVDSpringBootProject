<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create</title>
</head>
<body>
<form th:method="POST" th:action="@{/disks/create}" th:object="${disk}">
    <label for="title">Введите название</label>
    <input type="text" th:field="*{title}" id="title">
    <div style="color: red" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
    <br>
    <label for="author">Введите автора</label>
    <input type="text" th:field="*{author}" id="author">
    <div style="color: red" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></div>
    <br>
    <label for="date">Введите год релиза</label>
    <input type="text" th:field="*{releaseDate}" id="date">
    <div style="color: red" th:if="${#fields.hasErrors('releaseDate')}" th:errors="*{releaseDate}"></div>
    <br>
    <label for="annotation">Введите аннотацию</label>
    <input type="text" th:field="*{annotation}" id="annotation">
    <div style="color: red" th:if="${#fields.hasErrors('annotation')}" th:errors="*{annotation}"></div>
    <br>
    <input type="submit" value="Создать">
</form>
</body>
</html>
