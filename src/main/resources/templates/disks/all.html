<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Disks</title>
</head>
<body>
<div th:each="disk: ${disks}">
    <a th:href="@{/disks/{id}(id=${disk.getId()})}" th:text="${disk.getTitle()} + ', ' + ${disk.getAuthor()} + ', ' + ${disk.releaseDate}"></a>
</div>
</body>
</html>
