<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body>

<h1>Регистрация</h1>

<form th:method="post" th:action="@{/auth/register}" th:object="${personDTO}">

  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

  <label for="username">Введите имя пользователя</label>
  <input type="text" th:field="*{username}" id="username">
  <div style="color: red" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
  <br>
  <label for="password">Введите пароль</label>
  <input type="text" th:field="*{password}" id="password">
  <div style="color: red" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
  <br>
  <input type="submit" value="Вход">
</form>

<br>

<a th:href="@{/auth/login}">Уже есть аккаунт? Войти</a>

</body>
</html>
